<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0d0a09"/>

  <!-- Subtle grid pattern for depth -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1614" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.6"/>

  <!-- Left column: Brand + Positioning -->

  <!-- Logo mark -->
  <g transform="translate(80, 168) scale(1.5)" stroke="#f3ece4" stroke-width="2.8" stroke-linecap="round">
    <line x1="13" y1="3" x2="33" y2="3"/>
    <line x1="33" y1="3" x2="33" y2="33"/>
    <line x1="3" y1="33" x2="23" y2="33"/>
    <line x1="3" y1="3" x2="3" y2="33"/>
    <line x1="13" y1="13" x2="13" y2="23"/>
    <line x1="23" y1="3" x2="23" y2="13"/>
    <line x1="23" y1="23" x2="23" y2="33"/>
    <line x1="13" y1="23" x2="23" y2="23"/>
  </g>
  <path d="M8 3 L8 8 L18 8 L18 18 L28 18 L28 28 L28 33" transform="translate(80, 168) scale(1.5)" stroke="#2596be" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Name next to logo -->
  <text x="145" y="202" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24" font-weight="600" fill="#f3ece4" letter-spacing="-0.02em">Cerno</text>

  <!-- Positioning headline -->
  <text x="80" y="290" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="44" font-weight="600" fill="#f3ece4" letter-spacing="-0.03em">Human verification</text>
  <text x="80" y="344" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="44" font-weight="600" fill="#f3ece4" letter-spacing="-0.03em">for developers</text>

  <!-- Sub-line -->
  <text x="80" y="392" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="18" fill="#78716c">Motor-control analysis. No ML inference. No third-party calls.</text>

  <!-- Install line -->
  <rect x="80" y="430" width="380" height="40" rx="8" fill="#1a1614" stroke="#292524" stroke-width="1"/>
  <text x="100" y="456" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#78716c">$</text>
  <text x="118" y="456" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#a8a29e">npm i </text>
  <text x="173" y="456" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#f3ece4">@cernosh/react @cernosh/server</text>

  <!-- Right column: Code editor window -->

  <!-- Editor chrome -->
  <rect x="560" y="120" width="560" height="390" rx="12" fill="#1a1614" stroke="#292524" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="560" y="120" width="560" height="40" rx="12" fill="#1a1614"/>
  <rect x="560" y="148" width="560" height="12" fill="#1a1614"/>
  <!-- Window dots -->
  <circle cx="584" cy="140" r="5" fill="#292524"/>
  <circle cx="604" cy="140" r="5" fill="#292524"/>
  <circle cx="624" cy="140" r="5" fill="#292524"/>
  <!-- Tab -->
  <rect x="650" y="128" width="120" height="24" rx="4" fill="#0d0a09"/>
  <text x="670" y="145" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#a8a29e">verify.tsx</text>

  <!-- Separator line -->
  <line x1="560" y1="160" x2="1120" y2="160" stroke="#292524" stroke-width="1"/>

  <!-- Code content — real Cerno integration -->
  <!-- Line numbers -->
  <text x="580" y="186" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#44403c">1</text>
  <text x="580" y="210" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#44403c">2</text>
  <text x="580" y="234" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#44403c">3</text>
  <text x="580" y="258" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#44403c">4</text>
  <text x="580" y="282" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#44403c">5</text>
  <text x="580" y="306" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#44403c">6</text>
  <text x="580" y="330" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#44403c">7</text>
  <text x="580" y="354" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#44403c">8</text>
  <text x="580" y="378" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#44403c">9</text>
  <text x="575" y="402" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#44403c">10</text>
  <text x="575" y="426" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#44403c">11</text>
  <text x="575" y="450" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#44403c">12</text>
  <text x="575" y="474" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#44403c">13</text>
  <text x="575" y="498" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#44403c">14</text>

  <!-- Code line 1: import -->
  <text x="610" y="186" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#c084fc">import</text>
  <text x="663" y="186" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#f3ece4"> { Cerno } </text>
  <text x="760" y="186" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#c084fc">from</text>
  <text x="798" y="186" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#86efac"> '@cernosh/react'</text>

  <!-- Code line 2: import server -->
  <text x="610" y="210" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#c084fc">import</text>
  <text x="663" y="210" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#f3ece4"> { verifyToken } </text>
  <text x="798" y="210" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#c084fc">from</text>
  <text x="836" y="210" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#86efac"> '@cernosh/server'</text>

  <!-- Code line 3: blank -->

  <!-- Code line 4: comment -->
  <text x="610" y="258" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#44403c">// Client: drop-in React component</text>

  <!-- Code line 5: <Cerno -->
  <text x="610" y="282" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#f3ece4">&lt;</text>
  <text x="620" y="282" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#2596be">Cerno</text>

  <!-- Code line 6: siteKey -->
  <text x="634" y="306" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#93c5fd">siteKey</text>
  <text x="692" y="306" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#f3ece4">=</text>
  <text x="702" y="306" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#86efac">"site_..."</text>

  <!-- Code line 7: onVerify -->
  <text x="634" y="330" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#93c5fd">onVerify</text>
  <text x="700" y="330" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#f3ece4">={</text>
  <text x="718" y="330" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#fbbf24">(token)</text>
  <text x="774" y="330" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#c084fc"> =&gt; </text>
  <text x="808" y="330" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#f3ece4">submit(token)}</text>

  <!-- Code line 8: /> -->
  <text x="610" y="354" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#f3ece4">/&gt;</text>

  <!-- Code line 9: blank -->

  <!-- Code line 10: server comment -->
  <text x="610" y="402" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#44403c">// Server: verify the token</text>

  <!-- Code line 11: const result -->
  <text x="610" y="426" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#c084fc">const</text>
  <text x="651" y="426" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#f3ece4"> result = </text>
  <text x="735" y="426" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#c084fc">await</text>
  <text x="776" y="426" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#fbbf24"> verifyToken</text>
  <text x="873" y="426" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#f3ece4">(</text>

  <!-- Code line 12: token, secret -->
  <text x="634" y="450" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#f3ece4">token, </text>
  <text x="688" y="450" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#86efac">"secret_..."</text>

  <!-- Code line 13: ) -->
  <text x="610" y="474" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#f3ece4">)</text>

  <!-- Code line 14: result.ok -->
  <text x="610" y="498" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#f3ece4">result.ok </text>
  <text x="700" y="498" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#44403c">// true | false</text>

  <!-- Accent glow on code window edge -->
  <rect x="560" y="270" width="2" height="96" rx="1" fill="#2596be" opacity="0.5"/>
</svg>
