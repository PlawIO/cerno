<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0d0a09"/>

  <!-- Subtle glow from maze -->
  <radialGradient id="glow" cx="72%" cy="50%" r="35%">
    <stop offset="0%" stop-color="#2596be" stop-opacity="0.07"/>
    <stop offset="100%" stop-color="#0d0a09" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo mark -->
  <g transform="translate(100, 172)" stroke="#f3ece4" stroke-width="3.5" stroke-linecap="round">
    <line x1="13" y1="3" x2="33" y2="3"/>
    <line x1="33" y1="3" x2="33" y2="33"/>
    <line x1="3" y1="33" x2="23" y2="33"/>
    <line x1="3" y1="3" x2="3" y2="33"/>
    <line x1="13" y1="13" x2="13" y2="23"/>
    <line x1="23" y1="3" x2="23" y2="13"/>
    <line x1="23" y1="23" x2="23" y2="33"/>
    <line x1="13" y1="23" x2="23" y2="23"/>
  </g>
  <path d="M108 175 L108 180 L118 180 L118 190 L128 190 L128 200 L128 205" stroke="#2596be" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="148" y="198" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" font-weight="500" fill="#f3ece4" letter-spacing="-0.02em">Cerno</text>

  <!-- Headline -->
  <text x="100" y="296" font-family="ui-serif, Georgia, 'Times New Roman', serif" font-size="52" font-weight="400" fill="#f3ece4" letter-spacing="-0.03em">Human verification</text>
  <text x="100" y="358" font-family="ui-serif, Georgia, 'Times New Roman', serif" font-size="52" font-weight="400" fill="#f3ece4" letter-spacing="-0.03em">without hardware</text>

  <!-- Subtitle -->
  <text x="100" y="410" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="18" fill="#978f87" letter-spacing="-0.01em">Maze interaction, motor-control analysis, server-side behavioral scoring.</text>

  <!-- URL -->
  <text x="100" y="500" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#665f59" letter-spacing="0.01em">cerno.sh</text>

  <!-- ── Maze (5x5, cell=64, 320x320) ── -->
  <g transform="translate(740, 155)">
    <!-- Start cell highlight -->
    <rect x="1" y="1" width="62" height="62" rx="2" fill="#22c55e" opacity="0.1"/>
    <!-- End cell highlight -->
    <rect x="257" y="257" width="62" height="62" rx="2" fill="#ef4444" opacity="0.1"/>

    <!-- Maze walls -->
    <g stroke="#4d4743" stroke-width="2.5" stroke-linecap="round">
      <!-- Outer -->
      <line x1="0" y1="0" x2="320" y2="0"/>
      <line x1="0" y1="320" x2="320" y2="320"/>
      <line x1="0" y1="64" x2="0" y2="320"/>
      <line x1="320" y1="0" x2="320" y2="256"/>

      <!-- Horizontal interior -->
      <line x1="192" y1="64" x2="256" y2="64"/>
      <line x1="0" y1="128" x2="192" y2="128"/>
      <line x1="256" y1="128" x2="320" y2="128"/>
      <line x1="64" y1="192" x2="256" y2="192"/>
      <line x1="128" y1="256" x2="192" y2="256"/>

      <!-- Vertical interior -->
      <line x1="64" y1="0" x2="64" y2="64"/>
      <line x1="64" y1="256" x2="64" y2="320"/>
      <line x1="128" y1="0" x2="128" y2="64"/>
      <line x1="128" y1="192" x2="128" y2="256"/>
      <line x1="192" y1="64" x2="192" y2="128"/>
      <line x1="256" y1="128" x2="256" y2="192"/>
      <line x1="256" y1="256" x2="256" y2="320"/>
    </g>

    <!-- Solution path -->
    <polyline points="-8,32 32,32 32,96 96,96 160,96 160,32 224,32 288,32 288,96 224,96 224,160 160,160 96,160 32,160 32,224 96,224 96,288 160,288 224,288 224,224 288,224 288,288 328,288"
      stroke="#2596be" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Event dots along path -->
    <g fill="#2596be" opacity="0.4">
      <circle cx="32" cy="60" r="2.5"/>
      <circle cx="60" cy="96" r="2.5"/>
      <circle cx="130" cy="96" r="2.5"/>
      <circle cx="160" cy="68" r="2.5"/>
      <circle cx="188" cy="32" r="2.5"/>
      <circle cx="252" cy="32" r="2.5"/>
      <circle cx="288" cy="60" r="2.5"/>
      <circle cx="260" cy="96" r="2.5"/>
      <circle cx="224" cy="130" r="2.5"/>
      <circle cx="196" cy="160" r="2.5"/>
      <circle cx="130" cy="160" r="2.5"/>
      <circle cx="60" cy="160" r="2.5"/>
      <circle cx="32" cy="188" r="2.5"/>
      <circle cx="64" cy="224" r="2.5"/>
      <circle cx="96" cy="252" r="2.5"/>
      <circle cx="130" cy="288" r="2.5"/>
      <circle cx="192" cy="288" r="2.5"/>
      <circle cx="224" cy="260" r="2.5"/>
      <circle cx="256" cy="224" r="2.5"/>
      <circle cx="288" cy="252" r="2.5"/>
    </g>

    <!-- Start marker -->
    <circle cx="32" cy="32" r="6" fill="#22c55e" opacity="0.9"/>
    <!-- End marker -->
    <circle cx="288" cy="288" r="6" fill="#ef4444" opacity="0.9"/>
  </g>
</svg>
